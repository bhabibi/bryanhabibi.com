<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Bryan Habibi</title>
  <link rel="dns-prefetch" href="//fonts.googleapis.com" />
  <link rel="dns-prefetch" href="//fonts.gstatic.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="assets/BH_THUMB.png" />
  <link rel="canonical" href="https://bryanhabibi.com/404" />
</head>
<body>

  <!-- NAVIGATION -->
  <nav id="navbar">
    <div class="nav-inner">
      <div class="nav-switcher">
        <a href="https://bryanhabibi.com" class="switcher-btn active" aria-label="Go to Bryan Habibi site">Bryan Habibi</a>
        <a href="https://habibitakes.com" class="switcher-btn switcher-ht" aria-label="Go to HabibiTakes site">
          <img src="assets/habibitakes-button.jpg" alt="HabibiTakes logo" class="ht-btn-img" />
        </a>
      </div>
      <div class="nav-right">
        <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- 404 CONTENT -->
  <main style="min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 28px;">
    <div>
      <p class="section-label" style="justify-content:center;">Error</p>
      <h1 style="font-family:var(--serif);font-size:clamp(6rem,20vw,12rem);font-weight:700;color:var(--accent);line-height:1;margin-bottom:0;">404</h1>
      <h2 style="font-family:var(--serif);font-size:clamp(1.5rem,3vw,2rem);font-weight:600;margin-bottom:16px;">Page not found</h2>
      <p style="color:var(--text-muted);max-width:420px;margin:0 auto 40px;line-height:1.75;">Looks like this page doesn&rsquo;t exist. Let&rsquo;s get you back on track.</p>
      <a href="/" style="display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:var(--accent);color:#fff;border-radius:50px;font-weight:600;font-size:.9rem;transition:transform .2s,box-shadow .2s;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 22px rgba(176,125,78,.38)'" onmouseout="this.style.transform='';this.style.boxShadow=''">Back to Home</a>
    </div>
  </main>

  <script>
    (function () {
      const html = document.documentElement;
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) html.classList.add('dark');
    })();
    document.getElementById('themeToggle').addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('themeToggle').setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
    });
    document.getElementById('yr') && (document.getElementById('yr').textContent = new Date().getFullYear());
  </script>

</body>
</html>
